<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車牌探險家 - 真實OCR聯網版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Tesseract.js (強大 OCR 引擎) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute; width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            box-shadow: 0 0 20px #3b82f6;
            animation: scan 2s infinite ease-in-out;
        }

        .text-gradient {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .license-plate {
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            border: 2px solid #333;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            box-shadow: 0 4px 0 #999, 0 8px 15px rgba(0,0,0,0.3);
            position: relative;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen overflow-hidden flex flex-col select-none">

    <!-- 全域通知 -->
    <div id="notification" class="fixed top-6 left-1/2 transform -translate-x-1/2 glass px-6 py-3 rounded-2xl shadow-2xl z-[100] transition-all duration-500 opacity-0 pointer-events-none translate-y-[-20px] border-blue-500/50">
        <span id="notif-text" class="font-bold text-blue-400">通知訊息</span>
    </div>

    <!-- 主要容器 -->
    <main class="flex-1 overflow-hidden relative w-full max-w-md mx-auto bg-slate-900 shadow-2xl flex flex-col border-x border-slate-800">
        
        <!-- [ 首頁 ] -->
        <section id="view-home" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black text-gradient uppercase tracking-tighter">Plate Explorer</h1>
                    <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase">AI OCR Edition 3.0</p>
                </div>
            </div>
            
            <div class="glass rounded-3xl p-6 relative overflow-hidden shadow-inner border border-blue-500/20">
                <div id="ui-title" class="text-2xl font-black mb-4">探險準備中</div>
                <div class="flex justify-between items-end mb-2">
                    <div class="text-sm font-bold text-slate-300">Level <span id="ui-level" class="text-2xl text-blue-400 ml-1">1</span></div>
                    <div class="text-[10px] text-slate-400 font-mono"><span id="ui-exp">0</span> / <span id="ui-max-exp">100</span> XP</div>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2.5 p-0.5 shadow-inner">
                    <div id="ui-exp-bar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-1.5 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-2xl flex flex-col items-center border border-white/5">
                    <span class="text-slate-400 text-[10px] mb-1 font-bold">有效蒐藏數</span>
                    <div id="ui-col-count" class="text-3xl font-black text-blue-400">0</div>
                </div>
                <div class="glass p-4 rounded-2xl flex flex-col items-center border border-white/5">
                    <span class="text-slate-400 text-[10px] mb-1 font-bold">回收桶數量</span>
                    <div id="ui-trash-count" class="text-3xl font-black text-red-400">0</div>
                </div>
            </div>
        </section>

        <!-- [ 辨識頁面 ] -->
        <section id="view-scan" class="hidden flex-1 flex flex-col items-center p-6 space-y-4">
            <h2 class="text-2xl font-black mb-4">AI 視覺辨識</h2>
            <div class="w-full aspect-[4/3] bg-slate-950 rounded-3xl relative overflow-hidden shadow-2xl border border-slate-700/50 flex items-center justify-center">
                <!-- 原圖與處理後預覽 -->
                <canvas id="preview-canvas" class="absolute inset-0 w-full h-full object-contain hidden"></canvas>
                
                <div id="scan-prompt" class="text-slate-600 flex flex-col items-center animate-pulse">
                    <svg class="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    <span class="font-bold text-[10px]">等待相片輸入...</span>
                </div>

                <div id="scan-overlay" class="hidden absolute inset-0 bg-blue-900/30 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
                    <div class="scanner-line"></div>
                    <div class="bg-slate-900/80 px-4 py-2 rounded-xl border border-blue-500/50 mt-10">
                        <span id="ocr-status" class="text-blue-400 font-bold text-xs tracking-widest animate-pulse">連線載入 OCR 引擎中...</span>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 w-full gap-3">
                <button onclick="document.getElementById('file-input').click()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-2xl text-center shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span>啟動相機 / 本地照片</span>
                </button>
                <input type="file" accept="image/*" class="hidden" id="file-input">
                
                <button onclick="manualInput()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-black py-3 px-6 rounded-2xl text-center text-xs shadow-lg transition-all active:scale-95">
                    辨識失敗？點此手動輸入
                </button>
            </div>
        </section>

        <!-- [ 圖鑑頁面 ] -->
        <section id="view-pokedex" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-6 pb-2 glass space-y-4">
                <h2 class="text-2xl font-black">動態圖鑑庫</h2>
                <div class="flex space-x-1 bg-slate-950/50 p-1 rounded-xl text-xs font-bold">
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg bg-blue-600 text-white" data-tab="valid">已認證 (EXP)</button>
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg text-slate-400" data-tab="invalid">回收桶 (無效)</button>
                </div>
            </div>
            <div id="pokedex-container" class="flex-1 overflow-y-auto p-6 no-scrollbar">
                <div id="pokedex-list" class="space-y-3 pb-24">
                    <!-- 動態生成卡片 -->
                </div>
            </div>
        </section>

        <!-- 底端導航 -->
        <nav class="mt-auto glass border-t border-slate-800 px-4 py-2 z-50">
            <ul class="flex justify-between items-center max-w-sm mx-auto">
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-blue-400" data-target="view-home"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="text-[8px] font-black uppercase">Home</span></button></li>
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500" data-target="view-scan"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg><span class="text-[8px] font-black uppercase">Scan</span></button></li>
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500" data-target="view-pokedex"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg><span class="text-[8px] font-black uppercase">Dex</span></button></li>
            </ul>
        </nav>
    </main>

    <!-- 結果彈窗 -->
    <div id="result-modal" class="hidden fixed inset-0 z-[200] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl" id="result-modal-content">
            <h3 class="text-xl font-black mb-2 text-gradient" id="result-title">分析完成</h3>
            <div id="result-desc" class="text-xs text-slate-400 mb-6 max-h-24 overflow-y-auto text-left leading-relaxed">驗證結果說明</div>
            <div class="license-plate text-black text-3xl py-4 px-6 my-4 inline-block tracking-widest" id="result-plate">ABC-1234</div>
            <div class="text-blue-400 font-black text-2xl mb-8" id="result-exp">+ 0 XP</div>
            <button id="btn-close-result" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95">確認</button>
        </div>
    </div>

    <script>
        // --- 狀態與設定 ---
        let state = { level: 1, exp: 0, collected: [], recycled: [] };
        const TITLES = ["菜鳥探險家", "街頭觀察員", "字典翻閱者", "單字達人", "馬路語言學家", "OCR大師", "車牌鑑定專家", "傳奇字典", "學霸", "知識之神"];
        let currentTab = 'valid';

        // --- 新增：特殊數字涵義字典庫 ---
        const SPECIAL_NUMBERS = {
            "1111": "鐵支：一鳴驚人", "2222": "鐵支：雙雙對對", "3333": "鐵支：三陽開泰",
            "4444": "鐵支：事事如意", "5555": "鐵支：五福臨門", "6666": "鐵支：六六大順",
            "7777": "鐵支：幸運數字", "8888": "鐵支：發發發發", "9999": "鐵支：長長久久",
            "0000": "鐵支：從零開始",
            "1314": "一生一世", "0520": "我愛你", "520": "我愛你",
            "0168": "一路發", "168": "一路發", "1688": "一路發發", "888": "發發發",
            "5438": "我是三八", "9438": "就是三八",
            "2266": "零零落落 (台語)", "0857": "林北有錢 (台語)",
            "9487": "就是白癡", "9527": "唐伯虎專屬編號 (9527)", "8787": "白癡白癡",
            "7321": "乘法：七三二十一", "7749": "乘法：七七四十九", "5210": "乘法：五二一十",
            "5566": "台灣天團 5566", "0800": "控八控控"
        };

        // --- 初始化 ---
        function init() {
            const s = localStorage.getItem('plate_adventure_ocr');
            if(s) state = JSON.parse(s);
            renderUI();

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = (e) => {
                    showView(e.currentTarget.dataset.target);
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-blue-400', 'text-slate-500'));
                    e.currentTarget.classList.replace('text-slate-500', 'text-blue-400');
                };
            });

            document.getElementById('file-input').onchange = (e) => handleImage(e.target.files[0]);
            
            document.getElementById('btn-close-result').onclick = () => {
                document.getElementById('result-modal').classList.add('hidden');
                document.getElementById('scan-overlay').classList.add('hidden');
                document.getElementById('preview-canvas').classList.add('hidden');
                document.getElementById('scan-prompt').classList.remove('hidden');
            };

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-blue-600','text-white'); b.classList.add('text-slate-400'); });
                    e.target.classList.add('bg-blue-600','text-white'); e.target.classList.remove('text-slate-400');
                    currentTab = e.target.dataset.tab;
                    renderPokedex();
                };
            });
        }

        function showView(id) {
            ['view-home', 'view-scan', 'view-pokedex'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-pokedex') renderPokedex();
        }

        // --- 影像處理與真實 OCR ---
        async function handleImage(file) {
            if (!file || !file.type.startsWith('image/')) return;
            
            const cvs = document.getElementById('preview-canvas');
            const ctx = cvs.getContext('2d');
            const prompt = document.getElementById('scan-prompt');
            const overlay = document.getElementById('scan-overlay');
            const status = document.getElementById('ocr-status');
            
            cvs.classList.remove('hidden');
            prompt.classList.add('hidden');
            overlay.classList.remove('hidden');
            
            status.textContent = "影像二值化處理中...";

            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = async () => {
                // 為了加速辨識，將圖片縮放
                const scale = Math.min(800 / img.width, 800 / img.height);
                cvs.width = img.width * scale;
                cvs.height = img.height * scale;
                ctx.drawImage(img, 0, 0, cvs.width, cvs.height);

                // 黑白二值化處理 (增加 Tesseract 辨識率)
                const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    let val = avg < 120 ? 0 : 255; // 閥值
                    data[i] = data[i+1] = data[i+2] = val;
                }
                ctx.putImageData(imgData, 0, 0);

                status.textContent = "Tesseract OCR 分析中 (需網路)...";
                
                try {
                    // 使用 Tesseract CDN 進行辨識
                    const result = await Tesseract.recognize(cvs.toDataURL('image/jpeg'), 'eng');
                    const text = result.data.text.toUpperCase();
                    
                    // 正規表達式尋找台灣車牌特徵：2~4個英數 - 2~4個英數
                    const plateMatch = text.match(/[A-Z0-9]{2,4}\s*-?\s*[A-Z0-9]{2,4}/);
                    
                    if (plateMatch) {
                        let cleanPlate = plateMatch[0].replace(/\s/g, '');
                        if(!cleanPlate.includes('-')) {
                            // 嘗試補上 dash (例如前3後4)
                            let letters = cleanPlate.match(/[A-Z]+/);
                            if(letters) {
                                cleanPlate = cleanPlate.replace(letters[0], letters[0]+'-').replace('--', '-');
                            }
                        }
                        status.textContent = "正在連線辭典驗證字詞...";
                        await validateAndProcessPlate(cleanPlate);
                    } else {
                        // 辨識失敗，觸發手動輸入
                        overlay.classList.add('hidden');
                        showNotification("OCR 無法辨識出標準車牌格式");
                        manualInput(text.substring(0, 20)); // 給點提示
                    }
                } catch (err) {
                    overlay.classList.add('hidden');
                    showNotification("OCR 引擎載入失敗，請檢查網路狀態");
                }
            };
        }

        // 手動輸入補救機制
        function manualInput(hintText = "") {
            const input = prompt(`請手動輸入車牌號碼 (格式如 ABC-1234)：\n${hintText ? 'AI 抓取到的亂碼參考: ' + hintText : ''}`);
            if (input) {
                const clean = input.toUpperCase().replace(/\s/g, '');
                if (clean.length >= 4 && clean.includes('-')) {
                    document.getElementById('scan-overlay').classList.remove('hidden');
                    document.getElementById('ocr-status').textContent = "正在連線辭典驗證字詞...";
                    validateAndProcessPlate(clean);
                } else {
                    alert("格式錯誤，請包含 '-' 符號 (例: AAA-1111)");
                }
            }
        }

        // --- 字典驗證 API 邏輯 ---
        async function validateAndProcessPlate(plateStr) {
            const lettersMatch = plateStr.match(/[A-Z]+/g);
            const numbersMatch = plateStr.match(/[0-9]+/g);
            
            let englishWord = lettersMatch ? lettersMatch.join('') : "";
            let numberStr = numbersMatch ? numbersMatch.join('') : "";
            
            let isValid = false;
            let descLines = [];
            let expGained = 0;
            let tags = [];

            // 1. 驗證英文字母 (網路字典 API)
            if (englishWord.length >= 2) {
                try {
                    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${englishWord.toLowerCase()}`);
                    if (res.ok) {
                        const data = await res.json();
                        isValid = true;
                        let def = data[0].meanings[0].definitions[0].definition;
                        descLines.push(`[單字 ${englishWord}] : ${def}`);
                        expGained += englishWord.length * 50;
                        tags.push("WORD");
                    } else {
                        descLines.push(`[單字] : 查無此字 (${englishWord})`);
                    }
                } catch (e) {
                    descLines.push(`[單字] : 網路字典連線失敗`);
                }
            } else {
                descLines.push(`[單字] : 字母過短無法構成單字`);
            }

            // 2. 驗證特殊數字
            if (numberStr && SPECIAL_NUMBERS[numberStr]) {
                isValid = true;
                let numDef = SPECIAL_NUMBERS[numberStr];
                descLines.push(`[數字 ${numberStr}] : ${numDef}`);
                expGained += numberStr.length * 50;
                tags.push("SPECIAL NUM");
            } else if (numberStr) {
                // 去除開頭的0再查一次 (自動支援 0520 -> 520, 0168 -> 168)
                let trimmedNum = numberStr.replace(/^0+/, '');
                if (trimmedNum && SPECIAL_NUMBERS[trimmedNum]) {
                    isValid = true;
                    let numDef = SPECIAL_NUMBERS[trimmedNum];
                    descLines.push(`[數字 ${numberStr}] : ${numDef}`);
                    expGained += numberStr.length * 50;
                    tags.push("SPECIAL NUM");
                } else {
                    descLines.push(`[數字] : 無特殊涵義 (${numberStr})`);
                }
            }

            let finalDesc = descLines.join('<br><br>');

            // 檢查是否重複
            const isExist = state.collected.find(p => p.plate === plateStr) || state.recycled.find(p => p.plate === plateStr);

            const modal = document.getElementById('result-modal');
            const mTitle = document.getElementById('result-title');
            const mDesc = document.getElementById('result-desc');
            const mPlate = document.getElementById('result-plate');
            const mExp = document.getElementById('result-exp');

            mPlate.textContent = plateStr;
            document.getElementById('scan-overlay').classList.add('hidden');

            if (isExist) {
                mTitle.textContent = "已重複掃描";
                mTitle.className = "text-xl font-black mb-2 text-slate-400";
                mDesc.innerHTML = "這個車牌已經存在於你的紀錄中了。";
                mExp.textContent = "+ 0 XP";
            } else if (isValid) {
                // 有效 (單字或數字任一成立) -> 進入圖鑑
                state.collected.push({ plate: plateStr, tags: tags, desc: finalDesc });
                addExp(expGained);
                mTitle.textContent = "驗證成功！";
                mTitle.className = "text-xl font-black mb-2 text-emerald-400";
                mDesc.innerHTML = finalDesc;
                mExp.textContent = `+ ${expGained} XP`;
            } else {
                // 無效 -> 丟入回收桶
                state.recycled.push({ plate: plateStr, tags: ["INVALID"], desc: finalDesc });
                mTitle.textContent = "驗證失敗：丟入回收桶";
                mTitle.className = "text-xl font-black mb-2 text-red-400";
                mDesc.innerHTML = finalDesc;
                mExp.textContent = "+ 0 XP";
            }

            saveState();
            renderUI();
            modal.classList.remove('hidden');
        }

        function addExp(amt) {
            state.exp += amt;
            let next = state.level * 100;
            while(state.exp >= next && state.level < 100) {
                state.exp -= next;
                state.level++;
                next = state.level * 100;
                showNotification(`🎉 升級到 Lv.${state.level}！`);
            }
        }

        // --- 介面更新 ---
        function renderUI() {
            document.getElementById('ui-level').textContent = state.level;
            document.getElementById('ui-title').textContent = TITLES[Math.min(Math.floor((state.level-1)/5), 9)];
            const next = state.level * 100;
            document.getElementById('ui-exp').textContent = state.exp;
            document.getElementById('ui-max-exp').textContent = next;
            document.getElementById('ui-exp-bar').style.width = `${(state.exp/next)*100}%`;
            
            document.getElementById('ui-col-count').textContent = state.collected.length;
            document.getElementById('ui-trash-count').textContent = state.recycled.length;
        }

        function renderPokedex() {
            const container = document.getElementById('pokedex-list');
            container.innerHTML = '';
            
            // 決定顯示來源並按字母排序
            let list = currentTab === 'valid' ? [...state.collected] : [...state.recycled];
            list.sort((a, b) => a.plate.localeCompare(b.plate));

            if(list.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-500 font-bold">此區域目前為空</div>';
                return;
            }

            list.forEach(item => {
                const card = document.createElement('div');
                const isVal = currentTab === 'valid';
                card.className = `glass p-4 rounded-2xl border-l-4 ${isVal ? 'border-blue-500' : 'border-red-500/50 opacity-60'} flex flex-col gap-2`;
                
                // 處理圖鑑標籤 Badge
                let badgesHtml = '';
                if (item.tags && item.tags.length > 0) {
                    badgesHtml = item.tags.map(t => {
                        let colorClass = t === "INVALID" ? "bg-red-600/20 text-red-400 border-red-500/30" : 
                                         t === "SPECIAL NUM" ? "bg-purple-600/20 text-purple-400 border-purple-500/30" : 
                                         "bg-blue-600/20 text-blue-400 border-blue-500/30";
                        return `<span class="${colorClass} text-[10px] px-2 py-1 rounded-md font-bold border">${t}</span>`;
                    }).join(' ');
                } else {
                    // 相容舊資料
                    badgesHtml = isVal ? `<span class="bg-blue-600/20 text-blue-400 text-[10px] px-2 py-1 rounded-md font-bold border border-blue-500/30">VALID</span>` : `<span class="bg-red-600/20 text-red-400 text-[10px] px-2 py-1 rounded-md font-bold border border-red-500/30">RECYCLED</span>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="font-mono font-black text-lg ${isVal ? 'text-white' : 'text-slate-400 line-through decoration-red-500'}">${item.plate}</div>
                        <div class="flex gap-1">${badgesHtml}</div>
                    </div>
                    <div class="bg-slate-950/50 p-3 rounded-lg text-xs text-slate-300 leading-relaxed">
                        ${item.desc || `<span class="font-bold text-emerald-400">${item.word || '無字詞'}</span>`}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showNotification(m) {
            const n = document.getElementById('notification');
            document.getElementById('notif-text').textContent = m;
            n.style.opacity = '1'; n.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { n.style.opacity = '0'; n.style.transform = 'translate(-50%, -20px)'; }, 3000);
        }

        function saveState() { localStorage.setItem('plate_adventure_ocr', JSON.stringify(state)); }

        window.onload = init;
    </script>
</body>
</html>
