<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車牌探險家 - AI 極限辨識版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow-x: hidden; user-select: none; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .plate-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid #334155; transition: all 0.3s ease; }
        .plate-uncollected { filter: grayscale(100%); opacity: 0.35; }
        .plate-collected { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); background: linear-gradient(145deg, #334155, #1e293b); transform: scale(1.02); z-index: 10; }
        .plate-text { text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .plate-collected .plate-text { color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }
        .scanner-line { width: 100%; height: 4px; background: #fbbf24; box-shadow: 0 0 15px #fbbf24; position: absolute; top: 0; left: 0; animation: scan 1.5s linear infinite; z-index: 50; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .exp-bar-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="file"] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #scan-preview { filter: contrast(1.2) brightness(1.1); transition: opacity 0.3s; }
        .ai-glow { animation: ai-pulse 2s infinite; }
        @keyframes ai-pulse { 0%, 100% { box-shadow: 0 0 5px #3b82f6; } 50% { box-shadow: 0 0 20px #3b82f6; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 頂部資訊列 -->
    <header class="bg-slate-800 border-b border-slate-700 p-3 shadow-lg z-20 flex-shrink-0">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-blue-400 tracking-wider flex items-center gap-2">
                車牌探險家 <span class="text-[10px] bg-blue-600 px-1.5 py-0.5 rounded text-white ai-glow">AI VISION</span>
            </h1>
            <div id="status-tag" class="text-[10px] text-slate-400 bg-slate-900 px-2 py-0.5 rounded border border-slate-700">準備就緒</div>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center border-2 border-blue-300 font-tech text-lg shadow-inner" id="ui-level">1</div>
            <div class="flex-1">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-xs font-bold text-amber-400" id="ui-title">見習探險家</span>
                    <span class="text-[10px] text-slate-400 font-tech" id="ui-exp-text">0 / 100 EXP</span>
                </div>
                <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-700">
                    <div id="ui-exp-bar" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-full exp-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- 操作面板 -->
    <div class="bg-slate-800/80 p-2 border-b border-slate-700 flex-shrink-0 shadow-md">
        <div class="flex gap-2 mb-2">
            <label class="flex-1 bg-gradient-to-b from-blue-500 to-blue-700 text-white font-bold py-3 px-2 rounded-lg cursor-pointer flex flex-col items-center justify-center active:scale-95 transition shadow-lg border-b-4 border-blue-900">
                <div class="flex items-center gap-2 text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    啟動 AI 拍照
                </div>
                <input type="file" accept="image/*" capture="environment" onchange="handleImageUpload(event)">
            </label>
            
            <label class="flex-1 bg-slate-700 text-white font-bold py-3 px-2 rounded-lg cursor-pointer flex flex-col items-center justify-center active:scale-95 transition border border-slate-500">
                <div class="flex items-center gap-2 text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    從相簿匯入
                </div>
                <input type="file" accept="image/*" onchange="handleImageUpload(event)">
            </label>
        </div>
        
        <div class="flex overflow-x-auto gap-2 pb-1 no-scrollbar" id="tab-container"></div>
    </div>

    <!-- 主顯示區 -->
    <main class="flex-1 overflow-y-auto p-3 relative" id="main-content">
        <!-- 掃描中遮罩 -->
        <div id="scanning-overlay" class="hidden absolute inset-0 bg-slate-900/95 z-40 flex flex-col items-center justify-center p-6">
            <div class="relative w-full max-w-[300px] aspect-[4/3] border-2 border-amber-500 rounded-lg overflow-hidden mb-6 bg-black shadow-[0_0_30px_rgba(251,191,36,0.3)]">
                <img id="scan-preview" class="w-full h-full object-contain opacity-70">
                <div class="scanner-line"></div>
                <div class="absolute top-2 right-2 bg-amber-500 text-black text-[10px] px-1 font-bold rounded">AI 深度分析中</div>
            </div>
            <p class="text-amber-400 text-xs font-tech tracking-widest animate-pulse mb-2" id="scan-status">DEEP SCANNING...</p>
            <div class="w-full max-w-[300px] bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div id="scan-progress" class="bg-amber-500 h-full w-0 transition-all duration-300"></div>
            </div>
            <div class="mt-4 text-slate-500 text-[10px] text-center">正在調用 Gemini 2.5 視覺模型進行車牌校準...</div>
        </div>
        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 pb-20"></div>
    </main>

<script>
    const apiKey = ""; // 執行環境會自動提供
    const ENG3_DICT = { 
        "CIA": "情報局", "FBI": "聯邦調查局", "CAI": "青菜(諧音)", "BAD": "壞人", "GOD": "神明", "SOS": "求助", "WWW": "網路",
        "VIP": "貴賓", "WOW": "驚嘆", "YES": "確定", "ATM": "提款機", "CEO": "執行長", "CFO": "財務長"
    };
    const ENG2_DICT = { "AI": "人工智慧", "FB": "臉書", "OK": "沒問題", "GG": "完蛋", "UI": "介面" };

    const GAME_STATE = { 
        collected: new Set(), 
        exp: 0, 
        level: 1, 
        currentTab: 'num4', 
        currentPage: 1 
    };

    const TABS = [
        { id: 'num4', label: '4位數字', type: 'num', len: 4, count: 10000, pageSize: 60 },
        { id: 'num3', label: '3位數字', type: 'num', len: 3, count: 1000, pageSize: 60 },
        { id: 'eng3', label: '3位英文', type: 'eng', dict: ENG3_DICT, pageSize: 60 },
        { id: 'eng2', label: '2位英文', type: 'eng', dict: ENG2_DICT, pageSize: 60 }
    ];

    // --- 高精度 AI 辨識邏輯 ---
    async function handleImageUpload(e) {
        const file = e.target.files[0]; if(!file) return;
        const overlay = document.getElementById('scanning-overlay');
        const statusText = document.getElementById('scan-status');
        const progressBar = document.getElementById('scan-progress');
        const preview = document.getElementById('scan-preview');
        
        preview.src = URL.createObjectURL(file);
        overlay.classList.remove('hidden');
        statusText.innerText = "正在傳送 AI 視覺雲端...";
        progressBar.style.width = "30%";

        try {
            // 將圖片轉為 base64
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                
                progressBar.style.width = "60%";
                statusText.innerText = "Gemini AI 辨識中...";

                // 使用 Gemini 2.5 Flash 進行視覺辨識
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "這是一張車牌照片。請精確找出照片中的所有車牌號碼。請只列出號碼部分，例如 'ABC-1234' 或 '123-456'。如果有多個請用逗號隔開。請確保辨識準確，排除周邊雜訊文字。" },
                                { inlineData: { mimeType: "image/png", data: base64Data } }
                            ]
                        }]
                    })
                });

                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                progressBar.style.width = "90%";
                statusText.innerText = "結果分析與比對...";

                // 解析 AI 回傳的字串
                const matches = aiText.match(/[A-Z0-9]{2,4}/g) || [];
                let found = 0;
                
                matches.forEach(p => {
                    if(p.length === 4 && /^\d+$/.test(p)) { collect(`NUM4_${p}`); found++; }
                    else if(p.length === 3 && /^\d+$/.test(p)) { collect(`NUM3_${p}`); found++; }
                    else if(p.length === 3 && ENG3_DICT[p]) { collect(`ENG3_${p}`); found++; }
                    else if(p.length === 2 && ENG2_DICT[p]) { collect(`ENG2_${p}`); found++; }
                });

                progressBar.style.width = "100%";
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    if(found > 0) {
                        document.getElementById('status-tag').innerText = `最近辨識成功: ${found} 項`;
                        renderTabs(); renderGrid();
                    } else {
                        document.getElementById('status-tag').innerText = "辨識失敗，請嘗試更清晰的角度";
                    }
                }, 400);
            };
        } catch(err) {
            console.error("AI辨識錯誤:", err);
            overlay.classList.add('hidden');
        }
        e.target.value = '';
    }

    function collect(id) { 
        if(!GAME_STATE.collected.has(id)) {
            GAME_STATE.collected.add(id); 
            addExp(50); // AI 辨識給更多經驗
        }
    }

    function addExp(v) { 
        GAME_STATE.exp += v; 
        if(GAME_STATE.exp >= GAME_STATE.level*100){ 
            GAME_STATE.exp -= GAME_STATE.level*100; 
            GAME_STATE.level++; 
        } 
        updateUI(); 
    }
    
    function updateUI() {
        document.getElementById('ui-level').innerText = GAME_STATE.level;
        document.getElementById('ui-exp-text').innerText = `${GAME_STATE.exp} / ${GAME_STATE.level*100} EXP`;
        document.getElementById('ui-exp-bar').style.width = `${(GAME_STATE.exp/(GAME_STATE.level*100))*100}%`;
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = '';
        TABS.forEach(t => {
            const active = GAME_STATE.currentTab === t.id;
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 px-4 py-2 rounded-lg text-xs font-bold transition ${active ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-500'}`;
            btn.innerText = t.label;
            btn.onclick = () => { GAME_STATE.currentTab = t.id; renderTabs(); renderGrid(); };
            container.appendChild(btn);
        });
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        const tab = TABS.find(t => t.id === GAME_STATE.currentTab);
        
        let items = [];
        if(tab.type === 'num') {
            const start = (GAME_STATE.currentPage - 1) * tab.pageSize;
            for(let i=start; i<start+tab.pageSize; i++) {
                const s = String(i).padStart(tab.len, '0');
                items.push({ id: `${tab.id.toUpperCase()}_${s}`, text: s });
            }
        } else {
            Object.entries(tab.dict).forEach(([k, v]) => items.push({ id: `${tab.id.toUpperCase()}_${k}`, text: k, trans: v }));
        }

        items.forEach(item => {
            const collected = GAME_STATE.collected.has(item.id);
            const div = document.createElement('div');
            div.className = `plate-box rounded p-2 flex flex-col items-center justify-center aspect-[2.2/1] ${collected ? 'plate-collected' : 'plate-uncollected'}`;
            div.innerHTML = `<div class="text-[8px] font-tech plate-text">${item.text}</div>${item.trans ? `<div class="text-[8px] mt-1 opacity-60">${item.trans}</div>`:''}`;
            container.appendChild(div);
        });
    }

    window.onload = () => { renderTabs(); renderGrid(); updateUI(); };
</script>
</body>
</html>
