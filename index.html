<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車牌探險家 - 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow-x: hidden; user-select: none; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
        .plate-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid #334155; transition: all 0.3s ease; }
        .plate-uncollected { filter: grayscale(100%); opacity: 0.35; }
        .plate-collected { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); background: linear-gradient(145deg, #334155, #1e293b); transform: scale(1.02); z-index: 10; }
        .plate-text { text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .plate-collected .plate-text { color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }
        .scanner-line { width: 100%; height: 4px; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; position: absolute; top: 0; left: 0; animation: scan 2s linear infinite; z-index: 50; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .exp-bar-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="file"] { display: none; }
        .modal-overlay { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 頂部資訊列 -->
    <header class="bg-slate-800 border-b border-slate-700 p-3 shadow-lg z-20 flex-shrink-0">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-blue-400 tracking-wider">車牌探險家 <span class="text-[10px] bg-blue-900 px-1 rounded ml-1">v2.0</span></h1>
            <div class="flex gap-2">
                <button onclick="toggleMusic()" id="musicBtn" class="text-slate-400 p-1"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"></path></svg></button>
                <button onclick="toggleFullscreen()" class="text-slate-400 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                <button onclick="openSettings()" class="text-slate-400 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg></button>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center border-2 border-blue-300 font-tech text-lg shadow-inner" id="ui-level">1</div>
            <div class="flex-1">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-xs font-bold text-amber-400" id="ui-title">見習探險家</span>
                    <span class="text-[10px] text-slate-400 font-tech" id="ui-exp-text">0 / 100 EXP</span>
                </div>
                <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-700">
                    <div id="ui-exp-bar" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-full exp-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- 操作面板 -->
    <div class="bg-slate-800/80 p-2 border-b border-slate-700 flex-shrink-0 shadow-md">
        <label class="w-full mb-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-2 px-4 rounded-lg cursor-pointer flex items-center justify-center gap-2 active:scale-95 transition text-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            拍照 / 匯入辨識車牌
            <input type="file" accept="image/*" onchange="handleImageUpload(event)">
        </label>
        
        <div class="flex overflow-x-auto gap-2 pb-1 no-scrollbar" id="tab-container"></div>
        
        <div class="flex gap-2 mt-2 items-center">
            <div class="relative flex-1">
                <input type="text" id="search-input" placeholder="搜尋車牌或含義..." class="w-full bg-slate-900 border border-slate-600 rounded-lg py-1.5 pl-8 pr-3 text-xs text-white focus:outline-none focus:border-blue-500">
                <svg class="w-3.5 h-3.5 text-slate-500 absolute left-2.5 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex items-center gap-1 bg-slate-900 border border-slate-600 rounded-lg px-1 py-0.5">
                <button onclick="changePage(-1)" class="px-1 text-slate-400">&lt;</button>
                <input type="number" id="page-input" value="1" class="w-8 bg-transparent text-center text-white text-[10px] focus:outline-none">
                <span class="text-[10px] text-slate-500" id="total-pages">/ 1</span>
                <button onclick="changePage(1)" class="px-1 text-slate-400">&gt;</button>
            </div>
        </div>
    </div>

    <!-- 主顯示區 -->
    <main class="flex-1 overflow-y-auto p-3 relative" id="main-content">
        <div id="scanning-overlay" class="hidden absolute inset-0 bg-slate-900/90 z-40 flex flex-col items-center justify-center">
            <div class="relative w-48 h-48 border-2 border-blue-500 rounded-lg overflow-hidden mb-4">
                <img id="scan-preview" class="w-full h-full object-cover opacity-40">
                <div class="scanner-line"></div>
            </div>
            <p class="text-blue-400 text-xs font-tech animate-pulse" id="scan-status">ANALYZING...</p>
        </div>
        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 pb-20"></div>
    </main>

    <!-- 設定視窗 -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4 modal-overlay">
        <div class="bg-slate-800 border border-slate-600 rounded-xl w-full max-w-xs p-5 shadow-2xl relative">
            <button onclick="closeSettings()" class="absolute top-3 right-3 text-slate-400">✕</button>
            <h2 class="text-lg font-bold mb-4 text-blue-400">系統資訊</h2>
            <div class="space-y-4 text-xs">
                <div>
                    <label class="flex justify-between text-slate-400 mb-1">音量 <span id="vol-display">50%</span></label>
                    <input type="range" min="0" max="1" step="0.1" value="0.5" class="w-full" onchange="updateVolume(this.value)">
                </div>
                <div class="bg-slate-900 p-3 rounded border border-slate-700 text-slate-300 leading-relaxed">
                    <p>設計者: 郭柏宏</p>
                    <p>開發工具: Gemini</p>
                    <p>版本: 20260422</p>
                </div>
                <button onclick="simulateScan()" class="w-full py-2 bg-slate-700 text-slate-400 rounded">測試: 隨機模擬解鎖</button>
            </div>
        </div>
    </div>

    <!-- 成就提示 -->
    <div id="achievement-toast" class="fixed top-16 right-0 transform translate-x-full transition-transform duration-500 z-50 bg-amber-600 text-white px-4 py-2 rounded-l-lg shadow-xl flex items-center gap-2 border-l-4 border-amber-300">
        <div class="text-xl">🏆</div>
        <div>
            <div class="text-[10px] opacity-80 font-bold uppercase">Achievement!</div>
            <div id="toast-title" class="text-xs font-bold">解鎖成就</div>
        </div>
    </div>

 "FE": "Ferrari", "LA": "Lamborghini", "PO": "Porsche", "AU": "Audi", "BM": "BMW", "ME": "Mercedes", "VO": "Volvo", "FI": "Fiat", "RE": "Renault", "PE": "Peugeot", "CI": "Citroen", "JA": "Jaguar", "LR": "Land Rover", "RR": "Rolls-Royce", "BE": "Bentley", "AM": "Aston Martin", "MA": "Maserati", "AL": "Alfa Romeo", "SU": "Suzuki", "MA": "Mazda", "SU": "Subaru", "MI": "Mitsubishi", "IS": "Isuzu", "DA": "Daihatsu", "HI": "Hino"
    };

    const TITLES = ["見習探險家", "街頭觀察員", "車牌獵人", "數據收集者", "尋寶達人", "菁英探險家", "傳奇大師", "道路先知", "視覺神經元", "車牌之神"];
    const GAME_STATE = { collected: new Set(), exp: 0, level: 1, loginDays: 1, achievementsClaimed: new Set(), currentTab: 'num4', currentPage: 1, searchQuery: '', volume: 0.5, isMusicPlaying: false };
    const TABS = [
        { id: 'num4', label: '4位數字', type: 'num', len: 4, count: 10000, pageSize: 60 },
        { id: 'num3', label: '3位數字', type: 'num', len: 3, count: 1000, pageSize: 60 },
        { id: 'eng3', label: '3位英文', type: 'eng', dict: ENG3_DICT, pageSize: 60 },
        { id: 'eng2', label: '2位英文', type: 'eng', dict: ENG2_DICT, pageSize: 60 },
        { id: 'achievements', label: '探索成就', type: 'special' }
    ];
    const ACHIEVEMENTS = [];

    // --- 音效核心 ---
    let audioCtx, mainGain, bgmInterval;
    let bgmStep = 0;

    function initAudio() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGain = audioCtx.createGain();
            mainGain.gain.value = GAME_STATE.volume;
            mainGain.connect(audioCtx.destination);
        }
    }

    function playTone(freq, type, dur, vol, delay=0) {
        initAudio(); if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(mainGain);
        const t = audioCtx.currentTime + delay;
        osc.start(t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(vol, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.stop(t + dur);
    }

    function playSuccessSound() {
        playTone(440, 'sine', 0.3, 0.3, 0);
        playTone(554, 'sine', 0.3, 0.3, 0.1);
        playTone(659, 'sine', 0.4, 0.3, 0.2);
        playTone(880, 'sine', 0.6, 0.3, 0.3);
    }

    function playAchievementSound() {
        playTone(523.25, 'square', 0.2, 0.2, 0);
        playTone(659.25, 'square', 0.2, 0.2, 0.15);
        playTone(783.99, 'square', 0.2, 0.2, 0.3);
        playTone(1046.50, 'square', 0.6, 0.2, 0.45);
    }

    // --- 核心邏輯 ---
    function init() {
        genAch(); renderTabs(); updateUI(); renderGrid();
        document.getElementById('page-input').onchange = (e) => { GAME_STATE.currentPage = parseInt(e.target.value) || 1; renderGrid(); };
        document.getElementById('search-input').oninput = (e) => { GAME_STATE.searchQuery = e.target.value.toUpperCase(); GAME_STATE.currentPage = 1; renderGrid(); };
    }

    function genAch() {
        for(let i=1; i<=100; i++) {
            let type = i <= 50 ? 'special' : (i <= 80 ? 'count' : (i <= 90 ? 'level' : 'login'));
            ACHIEVEMENTS.push({ id: i, type: type, title: `成就 #${i}`, exp: 50 + i, claimed: false });
        }
    }

    function addExp(v) {
        GAME_STATE.exp += v;
        const req = GAME_STATE.level * 100;
        if(GAME_STATE.exp >= req) {
            GAME_STATE.exp -= req; GAME_STATE.level++;
            playAchievementSound();
            showToast(`等級提升！目前 Lv.${GAME_STATE.level}`);
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('ui-level').innerText = GAME_STATE.level;
        document.getElementById('ui-title').innerText = TITLES[Math.min(GAME_STATE.level-1, 9)];
        const req = GAME_STATE.level * 100;
        document.getElementById('ui-exp-text').innerText = `${GAME_STATE.exp} / ${req} EXP`;
        document.getElementById('ui-exp-bar').style.width = `${(GAME_STATE.exp/req)*100}%`;
    }

    function renderTabs() {
        const container = document.getElementById('tab-container');
        container.innerHTML = '';
        TABS.forEach(t => {
            const active = GAME_STATE.currentTab === t.id;
            let collected = 0;
            if(t.type !== 'special') {
                GAME_STATE.collected.forEach(id => { if(id.startsWith(t.id.toUpperCase())) collected++; });
            }
            const total = t.count || Object.keys(t.dict || {}).length;
            const btn = document.createElement('button');
            btn.className = `flex-shrink-0 px-3 py-1.5 rounded-lg text-[11px] font-bold transition whitespace-nowrap border-2 ${active ? 'bg-blue-600/20 border-blue-500 text-blue-400' : 'bg-slate-900 border-transparent text-slate-500'}`;
            btn.innerHTML = `${t.label} <span class="opacity-50 ml-1">${t.type !== 'special' ? Math.floor((collected/total)*100)+'%' : ''}</span>`;
            btn.onclick = () => { GAME_STATE.currentTab = t.id; GAME_STATE.currentPage = 1; renderTabs(); renderGrid(); };
            container.appendChild(btn);
        });
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        const tab = TABS.find(t => t.id === GAME_STATE.currentTab);
        
        if(tab.type === 'special') {
            ACHIEVEMENTS.forEach(a => {
                const div = document.createElement('div');
                div.className = "col-span-2 bg-slate-800 p-2 rounded border border-slate-700 text-[10px] flex justify-between items-center";
                const btnHtml = a.claimed 
                    ? `<button class="bg-slate-600 px-2 py-1 rounded text-slate-400 cursor-not-allowed" disabled>已領取</button>`
                    : `<button onclick="claimAch(${a.id})" class="bg-blue-600 px-2 py-1 rounded text-white active:bg-blue-700">領取</button>`;
                div.innerHTML = `<div><div class="font-bold">探索成就 ${a.id}</div><div class="text-slate-500">完成特定挑戰領取</div></div>${btnHtml}`;
                container.appendChild(div);
            });
            return;
        }

        let items = [];
        if(tab.type === 'num') {
            const start = (GAME_STATE.currentPage - 1) * tab.pageSize;
            const end = Math.min(start + tab.pageSize, tab.count);
            for(let i=start; i<end; i++) {
                const s = String(i).padStart(tab.len, '0');
                if(!GAME_STATE.searchQuery || s.includes(GAME_STATE.searchQuery)) items.push({ id: `${tab.id.toUpperCase()}_${s}`, text: s });
            }
        } else {
            Object.entries(tab.dict).forEach(([k, v]) => {
                if(!GAME_STATE.searchQuery || k.includes(GAME_STATE.searchQuery) || v.includes(GAME_STATE.searchQuery))
                    items.push({ id: `${tab.id.toUpperCase()}_${k}`, text: k, trans: v });
            });
            items = items.slice((GAME_STATE.currentPage-1)*tab.pageSize, GAME_STATE.currentPage*tab.pageSize);
        }

        items.forEach(item => {
            const collected = GAME_STATE.collected.has(item.id);
            const div = document.createElement('div');
            div.className = `plate-box rounded p-2 flex flex-col items-center justify-center aspect-[2/1] ${collected ? 'plate-collected' : 'plate-uncollected'}`;
            div.innerHTML = `<div class="text-[8px] opacity-30 uppercase">Taiwan</div><div class="text-lg font-black font-tech plate-text">${item.text}</div>${item.trans ? `<div class="text-[9px] mt-1 bg-black/40 px-1 rounded">${item.trans}</div>`:''}`;
            container.appendChild(div);
        });

        document.getElementById('total-pages').innerText = `/ ${Math.ceil((tab.count || Object.keys(tab.dict).length)/tab.pageSize)}`;
        document.getElementById('page-input').value = GAME_STATE.currentPage;
    }

    async function handleImageUpload(e) {
        const file = e.target.files[0]; if(!file) return;
        const overlay = document.getElementById('scanning-overlay');
        const statusText = document.getElementById('scan-status');
        document.getElementById('scan-preview').src = URL.createObjectURL(file);
        overlay.classList.remove('hidden');
        statusText.innerText = "初始化掃描引擎...";
        
        try {
            const res = await Tesseract.recognize(file, 'eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        statusText.innerText = `辨識中... ${Math.round(m.progress * 100)}%`;
                    }
                }
            });
            const text = res.data.text.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let count = 0;
            
            const letters = text.match(/[A-Z]{2,3}/g) || [];
            const numbers = text.match(/[0-9]{3,4}/g) || [];

            letters.forEach(m => {
                let id = '';
                if(m.length === 3 && ENG3_DICT[m]) id = `ENG3_${m}`;
                else if(m.length === 2 && ENG2_DICT[m]) id = `ENG2_${m}`;
                if(id && !GAME_STATE.collected.has(id)) { GAME_STATE.collected.add(id); count++; addExp(20); }
            });

            numbers.forEach(m => {
                let id = '';
                if(m.length === 4) id = `NUM4_${m}`;
                else if(m.length === 3) id = `NUM3_${m}`;
                if(id && !GAME_STATE.collected.has(id)) { GAME_STATE.collected.add(id); count++; addExp(20); }
            });

            if(count > 0) { 
                playSuccessSound(); 
                showToast(`成功收集 ${count} 個車牌！`); 
                renderTabs(); 
                renderGrid(); 
            } else { 
                alert("未辨識到新的有效車牌。\n辨識參考: " + (text || "無")); 
            }
        } catch(e) { 
            console.error(e);
            alert("辨識發生錯誤，請重新嘗試。"); 
        }
        overlay.classList.add('hidden');
        e.target.value = ''; // Reset input
    }

    function showToast(m) {
        const t = document.getElementById('achievement-toast');
        document.getElementById('toast-title').innerText = m;
        t.classList.remove('translate-x-full');
        setTimeout(() => t.classList.add('translate-x-full'), 3000);
    }

    function changePage(d) { GAME_STATE.currentPage = Math.max(1, GAME_STATE.currentPage + d); renderGrid(); }
    function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
    function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
    function updateVolume(v) { GAME_STATE.volume = v; if(mainGain) mainGain.gain.value = v; document.getElementById('vol-display').innerText = Math.round(v*100)+'%'; }
    function toggleFullscreen() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    
    function toggleMusic() {
        initAudio();
        if(GAME_STATE.isMusicPlaying) {
            clearInterval(bgmInterval); GAME_STATE.isMusicPlaying = false;
            document.getElementById('musicBtn').classList.replace('text-blue-400', 'text-slate-400');
        } else {
            GAME_STATE.isMusicPlaying = true;
            document.getElementById('musicBtn').classList.replace('text-slate-400', 'text-blue-400');
            bgmStep = 0;
            bgmInterval = setInterval(() => {
                const scale = [220, 246.94, 277.18, 329.63, 369.99, 440];
                const freqs = [scale[0], scale[2], scale[4], scale[1], scale[3], scale[5]];
                playTone(freqs[bgmStep % freqs.length], 'triangle', 0.8, 0.05);
                bgmStep++;
            }, 600);
        }
    }

    function simulateScan() {
        const keys = [Object.keys(ENG3_DICT), Object.keys(ENG2_DICT)];
        const rK = keys[Math.floor(Math.random()*2)];
        const word = rK[Math.floor(Math.random()*rK.length)];
        const num = String(Math.floor(Math.random()*9999)).padStart(4, '0');
        // 為了模擬效果直接加
        GAME_STATE.collected.add(`${word.length===3?'ENG3':'ENG2'}_${word}`);
        GAME_STATE.collected.add(`NUM4_${num}`);
        addExp(50); 
        playSuccessSound();
        renderTabs(); renderGrid(); showToast("模擬解鎖成功！");
    }

    function claimAch(id) { 
        const ach = ACHIEVEMENTS.find(a => a.id === id);
        if(ach && !ach.claimed) {
            ach.claimed = true;
            playAchievementSound(); 
            addExp(ach.exp); 
            showToast(`領取成就獎勵 +${ach.exp} EXP`); 
            renderGrid();
        }
    }

    window.onload = init;
