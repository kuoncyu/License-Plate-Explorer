<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車牌探險家 - 成就優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, #4ade80, transparent);
            box-shadow: 0 0 15px #4ade80;
            animation: scan 2s infinite ease-in-out;
        }

        .text-gradient {
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .license-plate {
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            border: 2px solid #333;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            box-shadow: 0 4px 0 #999, 0 8px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .achievement-card { transition: all 0.3s ease; }
        .achievement-card.locked { filter: grayscale(1) opacity(0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen overflow-hidden flex flex-col select-none">

    <!-- 全域通知 -->
    <div id="notification" class="fixed top-6 left-1/2 transform -translate-x-1/2 glass px-6 py-3 rounded-2xl shadow-2xl z-[100] transition-all duration-500 opacity-0 pointer-events-none translate-y-[-20px] border-emerald-500/50">
        <span id="notif-text" class="font-bold text-emerald-400">通知訊息</span>
    </div>

    <!-- 主要容器 -->
    <main class="flex-1 overflow-hidden relative w-full max-w-md mx-auto bg-slate-900 shadow-2xl flex flex-col border-x border-slate-800">
        
        <!-- [ 首頁 ] -->
        <section id="view-home" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black text-gradient uppercase tracking-tighter">Plate Explorer</h1>
                    <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase">Version 2.2.1</p>
                </div>
                <button id="btn-open-settings" class="p-3 glass rounded-full text-slate-300 hover:text-white transition-all active:scale-90">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                </button>
            </div>
            
            <div class="glass rounded-3xl p-6 relative overflow-hidden shadow-inner">
                <div id="ui-title" class="text-2xl font-black mb-4">探險準備中</div>
                <div class="flex justify-between items-end mb-2">
                    <div class="text-sm font-bold text-slate-300">Level <span id="ui-level" class="text-2xl text-blue-400 ml-1">1</span></div>
                    <div class="text-[10px] text-slate-400 font-mono"><span id="ui-exp">0</span> / <span id="ui-max-exp">100</span> XP</div>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2.5 p-0.5 shadow-inner">
                    <div id="ui-exp-bar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-1.5 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-2xl flex flex-col items-center border border-white/5">
                    <span class="text-slate-400 text-[10px] mb-1 font-bold">4位數字進度</span>
                    <div id="ui-prog-num4" class="text-xl font-black text-white">0%</div>
                </div>
                <div class="glass p-4 rounded-2xl flex flex-col items-center border border-white/5">
                    <span class="text-slate-400 text-[10px] mb-1 font-bold">3位數字進度</span>
                    <div id="ui-prog-num3" class="text-xl font-black text-white">0%</div>
                </div>
            </div>

            <!-- 成就快捷摘要 -->
            <div class="glass p-5 rounded-2xl border border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold">成就解鎖度</h3>
                    <span id="ui-ach-count" class="text-[10px] text-emerald-400 font-mono">0 / 0</span>
                </div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="ui-ach-bar" class="bg-emerald-500 h-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <!-- [ 辨識頁面 ] -->
        <section id="view-scan" class="hidden flex-1 flex flex-col items-center p-6 space-y-4">
            <h2 class="text-2xl font-black mb-4">採集車牌</h2>
            <div class="w-full aspect-video bg-slate-950 rounded-3xl relative overflow-hidden shadow-2xl border border-slate-700/50 flex items-center justify-center">
                <canvas id="preview-canvas" class="absolute inset-0 w-full h-full object-cover hidden"></canvas>
                <div id="scan-prompt" class="text-slate-600 flex flex-col items-center animate-pulse">
                    <svg class="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span class="font-bold text-[10px]">等待讀取照片...</span>
                </div>
                <div id="scan-overlay" class="hidden absolute inset-0 bg-blue-500/10">
                    <div class="scanner-line"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 w-full gap-3">
                <button onclick="document.getElementById('file-input').click()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-2xl text-center shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    <span>拍照或選擇本地照片</span>
                </button>
                <input type="file" accept="image/*" class="hidden" id="file-input">

                <button onclick="document.getElementById('folder-input').click()" class="bg-slate-700 hover:bg-slate-600 text-white font-black py-4 px-6 rounded-2xl text-center shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    <span>讀取資料夾內照片</span>
                </button>
                <input type="file" webkitdirectory directory multiple class="hidden" id="folder-input">
            </div>

            <div id="batch-progress" class="hidden w-full text-[10px] font-bold text-slate-400 text-center glass p-3 rounded-xl border-blue-500/30">
                🚀 批次處理中: <span id="batch-count" class="text-blue-400 text-sm">0 / 0</span>
            </div>
        </section>

        <!-- [ 圖鑑頁面 ] -->
        <section id="view-pokedex" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-6 pb-2 glass space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black">蒐藏圖鑑</h2>
                    <span id="ui-tab-count" class="text-[10px] bg-slate-700 px-2 py-1 rounded-md text-slate-300 font-mono">0 / 0</span>
                </div>
                <div class="relative group">
                    <input type="text" id="pokedex-search" placeholder="搜尋號碼..." class="w-full bg-slate-950/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-all">
                    <svg class="w-4 h-4 absolute left-3 top-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <div class="flex space-x-1 bg-slate-950/50 p-1 rounded-xl text-[10px] font-bold">
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg bg-blue-600 text-white" data-tab="num4">4位數</button>
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg text-slate-400" data-tab="num3">3位數</button>
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg text-slate-400" data-tab="eng3">3位英文</button>
                    <button class="tab-btn flex-1 py-2 text-center rounded-lg text-slate-400" data-tab="eng2">2位英文</button>
                </div>
            </div>
            <div id="pokedex-container" class="flex-1 overflow-y-auto p-6 no-scrollbar">
                <div id="pokedex-pagination" class="flex items-center justify-between mb-6 glass p-2 rounded-xl text-[10px] font-bold">
                    <button id="btn-prev-page" class="p-2 bg-slate-800 rounded-lg">PREV</button>
                    <div class="flex items-center gap-2">
                        <input type="number" id="input-page" class="w-12 bg-slate-950 border border-slate-700 rounded text-center py-1 outline-none" value="1">
                        <span id="page-total">/ 0</span>
                    </div>
                    <button id="btn-next-page" class="p-2 bg-slate-800 rounded-lg">NEXT</button>
                </div>
                <div id="pokedex-grid" class="grid grid-cols-3 gap-3 pb-24"></div>
            </div>
        </section>

        <!-- [ 成就頁面 ] -->
        <section id="view-achievements" class="hidden flex-1 overflow-y-auto no-scrollbar p-6 space-y-4">
            <h2 class="text-2xl font-black mb-6">探險成就</h2>
            <div id="achievements-list" class="space-y-3 pb-24"></div>
        </section>

        <!-- [ 設定頁面 ] -->
        <section id="view-settings" class="hidden flex-1 overflow-y-auto no-scrollbar p-6 space-y-8">
            <div class="flex items-center gap-4">
                <button id="btn-close-settings" class="p-2 glass rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                <h2 class="text-2xl font-black">設定</h2>
            </div>
            <div class="space-y-6">
                <button id="btn-clear-data" class="w-full bg-red-900/50 text-red-400 border border-red-500/30 font-bold py-4 rounded-2xl active:scale-95">重置所有進度</button>
                <div class="glass p-5 rounded-2xl space-y-4 text-sm">
                    <div class="flex justify-between border-b border-slate-700/50 pb-2 text-slate-400"><span>設計者</span><span class="text-white">郭柏宏</span></div>
                    <div class="flex justify-between text-slate-400"><span>版本</span><span class="text-white">2.2.1</span></div>
                </div>
            </div>
        </section>

        <!-- 底端導航 -->
        <nav class="mt-auto glass border-t border-slate-800 px-4 py-2 z-50">
            <ul class="flex justify-between items-center max-w-sm mx-auto">
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-blue-400" data-target="view-home"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="text-[8px] font-black uppercase">Home</span></button></li>
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500" data-target="view-scan"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg><span class="text-[8px] font-black uppercase">Scan</span></button></li>
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500" data-target="view-pokedex"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg><span class="text-[8px] font-black uppercase">Dex</span></button></li>
                <li><button class="nav-btn flex flex-col items-center gap-1 p-2 text-slate-500" data-target="view-achievements"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg><span class="text-[8px] font-black uppercase">Medal</span></button></li>
            </ul>
        </nav>
    </main>

    <!-- 結果彈窗 -->
    <div id="result-modal" class="hidden fixed inset-0 z-[200] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl" id="result-modal-content">
            <h3 class="text-2xl font-black mb-2 text-gradient" id="result-title">NEW DISCOVERY</h3>
            <div class="license-plate text-black text-4xl py-5 px-8 my-8 inline-block tracking-widest" id="result-plate">ABC-1234</div>
            <div class="text-blue-400 font-black text-2xl mb-8" id="result-exp">+ 50 XP</div>
            <button id="btn-close-result" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95">確認領取</button>
        </div>
    </div>

    <script>
        // --- 核心系統與音效 ---
        let AudioCtx;
        function initAudio() {
            if (!AudioCtx) AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        let sfxVolume = 0.8;
        const playTone = (freq, type, duration, vol) => {
            if (!AudioCtx) return;
            const osc = AudioCtx.createOscillator();
            const gain = AudioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
            gain.gain.setValueAtTime(vol * sfxVolume, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(AudioCtx.destination);
            osc.start(); osc.stop(AudioCtx.currentTime + duration);
        };
        const SFX = {
            click: () => { initAudio(); playTone(800, 'sine', 0.1, 0.2); },
            scan: () => { initAudio(); playTone(400, 'triangle', 0.5, 0.3); },
            success: () => { initAudio(); playTone(523, 'sine', 0.2, 0.3); setTimeout(() => playTone(659, 'sine', 0.3, 0.3), 100); },
            levelUp: () => { initAudio(); [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.5, 0.2), i * 150)); },
            claim: () => { initAudio(); playTone(1200, 'sine', 0.3, 0.3); }
        };

        // --- 常數與數據結構 ---
        const ENG3_WORDS = [{word:"ANT",tw:"螞蟻"},{word:"ATM",tw:"提款機"},{word:"BUS",tw:"公車"},{word:"CAR",tw:"汽車"},{word:"DOG",tw:"狗"},{word:"CAT",tw:"貓"},{word:"PIG",tw:"豬"},{word:"COW",tw:"牛"},{word:"FOX",tw:"狐狸"},{word:"BAT",tw:"蝙蝠"},{word:"SUN",tw:"太陽"},{word:"SEA",tw:"海洋"},{word:"SKY",tw:"天空"},{word:"VIP",tw:"貴賓"},{word:"UFO",tw:"幽浮"}];
        const ENG2_WORDS = [{word:"AM",tw:"上午"},{word:"PM",tw:"下午"},{word:"OK",tw:"好的"},{word:"HI",tw:"嗨"},{word:"GO",tw:"去"}];
        const TITLES = ["菜鳥探險家", "街頭觀察員", "車牌獵人", "尋寶達人", "馬路偵探", "數字專家", "字母大師", "傳奇蒐藏家", "車牌學霸", "車牌之神"];

        // 生成優化後的成就
        const ACHIEVEMENTS = [];
        
        // 1. 等級里程碑 (10個為一區間: 10, 20, ..., 100)
        for(let i=1; i<=10; i++) {
            const lv = i * 10;
            ACHIEVEMENTS.push({ 
                id: `lv_${lv}`, 
                title: `等級大躍進 Lv.${lv}`, 
                desc: `成功將等級提升至 ${lv} 級`, 
                reward: lv * 20, 
                check: (s) => s.level >= lv 
            });
        }

        // 2. 獵人進階 (100個為一個區間)
        for(let i=1; i<=10; i++) {
            const count = i * 100;
            ACHIEVEMENTS.push({ 
                id: `total_${count}`, 
                title: `傳奇獵人里程碑 #${i}`, 
                desc: `總共蒐集 ${count} 個不同車牌`, 
                reward: count * 10, 
                check: (s) => {
                    const total = s.collected.num4.length + s.collected.num3.length + s.collected.eng3.length + s.collected.eng2.length;
                    return total >= count;
                }
            });
        }

        // 3. 數字收藏家 (10個區間: 10, 20, ..., 100)
        for(let i=1; i<=10; i++) {
            const count = i * 10;
            ACHIEVEMENTS.push({ id: `num4_col_${count}`, title: `數字蒐藏家 ${i}`, desc: `蒐集 ${count} 個 4位數車牌`, reward: count * 10, check: (s) => s.collected.num4.length >= count });
        }

        // 4. 其他專項成就
        ACHIEVEMENTS.push({ id: 'special_8888', title: '大發利市', desc: '蒐集到編號 8888', reward: 888, check: (s) => s.collected.num4.includes('8888') });
        ACHIEVEMENTS.push({ id: 'special_0000', title: '一切的開始', desc: '蒐集到編號 0000', reward: 500, check: (s) => s.collected.num4.includes('0000') });
        ACHIEVEMENTS.push({ id: 'special_eng_all', title: '詞彙大師', desc: '解鎖所有預設 3位英文單字', reward: 2000, check: (s) => s.collected.eng3.length >= ENG3_WORDS.length });

        // 補足其餘成就
        for(let i=1; i<=67; i++) {
            const goal = 100 + (i * 20);
            ACHIEVEMENTS.push({ id: `filler_${i}`, title: `進階挑戰 ${i}`, desc: `4位數車牌蒐集量突破 ${goal} 個`, reward: 200, check: (s) => s.collected.num4.length >= goal });
        }

        let state = { level: 1, exp: 0, collected: { num4: [], num3: [], eng3: [], eng2: [] }, claimedAchievements: [] };
        let currentTab = 'num4', pokedexPage = 0, searchQuery = "";
        const ITEMS_PER_PAGE = 30;

        // --- 邏輯函數 ---
        function init() {
            loadState();
            renderUI();
            
            // 全域按鈕事件與 Null Check
            const safeClick = (id, fn) => { const el = document.getElementById(id); if(el) el.onclick = fn; };

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = (e) => {
                    SFX.click();
                    showView(e.currentTarget.dataset.target);
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-blue-400', 'text-slate-500'));
                    e.currentTarget.classList.replace('text-slate-500', 'text-blue-400');
                };
            });

            safeClick('btn-open-settings', () => showView('view-settings'));
            safeClick('btn-close-settings', () => showView('view-home'));
            safeClick('btn-clear-data', () => {
                if(confirm("確定要重置所有探險數據嗎？")) {
                    localStorage.removeItem('plate_adventure_v4');
                    location.reload();
                }
            });

            const fileInput = document.getElementById('file-input');
            if(fileInput) fileInput.onchange = (e) => handleFiles(e.target.files);

            const folderInput = document.getElementById('folder-input');
            if(folderInput) folderInput.onchange = (e) => handleFiles(e.target.files, true);

            safeClick('btn-close-result', () => {
                SFX.click();
                document.getElementById('result-modal').classList.add('hidden');
                document.getElementById('preview-canvas').classList.add('hidden');
                document.getElementById('scan-prompt').classList.remove('hidden');
            });

            const pokedexSearch = document.getElementById('pokedex-search');
            if(pokedexSearch) pokedexSearch.oninput = (e) => { searchQuery = e.target.value; pokedexPage = 0; renderPokedex(); };

            safeClick('btn-prev-page', () => { if(pokedexPage > 0) { pokedexPage--; updatePaginationUI(); renderPokedex(); } });
            safeClick('btn-next-page', () => { const max = Math.ceil(getTotalItems() / ITEMS_PER_PAGE) - 1; if(pokedexPage < max) { pokedexPage++; updatePaginationUI(); renderPokedex(); } });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = (e) => {
                    SFX.click();
                    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('bg-blue-600','text-white'); b.classList.add('text-slate-400'); });
                    e.target.classList.add('bg-blue-600','text-white'); e.target.classList.remove('text-slate-400');
                    currentTab = e.target.dataset.tab; pokedexPage = 0; searchQuery = "";
                    const searchInput = document.getElementById('pokedex-search');
                    if(searchInput) searchInput.value = "";
                    updatePaginationUI(); renderPokedex();
                };
            });
        }

        function showView(id) {
            ['view-home', 'view-scan', 'view-pokedex', 'view-achievements', 'view-settings'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
            if(id === 'view-pokedex') renderPokedex();
            if(id === 'view-achievements') renderAchievements();
            if (AudioCtx && AudioCtx.state === 'suspended') AudioCtx.resume();
        }

        async function handleFiles(files, isBatch = false) {
            if (!files || files.length === 0) return;
            initAudio();
            SFX.scan();
            const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if(validFiles.length === 0) { showNotification("未發現有效照片"); return; }

            if (isBatch) {
                const batchUI = document.getElementById('batch-progress');
                const batchCount = document.getElementById('batch-count');
                if(batchUI) batchUI.classList.remove('hidden');
                let count = 0;
                for (let file of validFiles) {
                    count++;
                    if(batchCount) batchCount.textContent = `${count} / ${validFiles.length}`;
                    await processSingleFile(file, true);
                }
                if(batchUI) batchUI.classList.add('hidden');
                showNotification(`批次處理完成！`);
                SFX.success();
            } else {
                processSingleFile(validFiles[0], false);
            }
        }

        function processSingleFile(file, silent = false) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    if (!silent) {
                        const cvs = document.getElementById('preview-canvas');
                        const prompt = document.getElementById('scan-prompt');
                        const overlay = document.getElementById('scan-overlay');
                        if (cvs) {
                            const ctx = cvs.getContext('2d');
                            cvs.classList.remove('hidden');
                            if(prompt) prompt.classList.add('hidden');
                            cvs.width = 640; cvs.height = 480;
                            ctx.drawImage(img, 0, 0, 640, 480);
                        }
                        if(overlay) overlay.classList.remove('hidden');
                        setTimeout(() => {
                            performRecognition(file, silent);
                            if(overlay) overlay.classList.add('hidden');
                            resolve();
                        }, 1000);
                    } else {
                        performRecognition(file, silent);
                        resolve();
                    }
                };
                img.onerror = () => resolve();
            });
        }

        function performRecognition(file, silent) {
            const seed = (file.size % 999) + (file.name.length * 3);
            const rng = (limit) => Math.floor(((Math.abs(Math.sin(seed) * 10000)) % limit));
            const types = ['num4', 'num4', 'num3', 'eng3', 'eng2'];
            const type = types[seed % types.length];
            let val, display;
            
            if(type === 'num4') { val = String(rng(10000)).padStart(4,'0'); display = `ABC-${val}`; }
            else if(type === 'num3') { val = String(rng(1000)).padStart(3,'0'); display = `XYZ-${val}`; }
            else if(type === 'eng3') { const o = ENG3_WORDS[rng(ENG3_WORDS.length)]; val = o.word; display = `${val}-7777`; }
            else { const o = ENG2_WORDS[rng(ENG2_WORDS.length)]; val = o.word; display = `${val}-1234`; }

            const isNew = !state.collected[type].includes(val);
            if(isNew) {
                state.collected[type].push(val);
                const exp = {num4:20, num3:40, eng3:80, eng2:150}[type];
                addExp(exp);
                if(!silent) {
                    SFX.success();
                    updateResultModal("✨ 發現新圖鑑！", `+ ${exp} XP`, display);
                }
            } else if(!silent) {
                updateResultModal("已蒐集過的車牌", "+ 0 XP", display);
            }
            saveState(); renderUI();
        }

        function updateResultModal(title, expText, plate) {
            const t = document.getElementById('result-title');
            const e = document.getElementById('result-exp');
            const p = document.getElementById('result-plate');
            const m = document.getElementById('result-modal');
            if(t) t.textContent = title;
            if(e) e.textContent = expText;
            if(p) p.textContent = plate;
            if(m) m.classList.remove('hidden');
        }

        function addExp(amt) {
            state.exp += amt;
            let next = state.level * 100;
            while(state.exp >= next && state.level < 100) {
                state.exp -= next;
                state.level++;
                next = state.level * 100;
                SFX.levelUp();
                showNotification(`🎉 升級！目前等級 Lv.${state.level}`);
            }
        }

        function renderUI() {
            const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
            set('ui-level', state.level);
            set('ui-title', TITLES[Math.floor((state.level-1)/10)] || "傳奇宗師");
            const next = state.level * 100;
            set('ui-exp', state.exp);
            set('ui-max-exp', next);
            const bar = document.getElementById('ui-exp-bar');
            if(bar) bar.style.width = `${(state.exp/next)*100}%`;
            
            set('ui-prog-num4', ((state.collected.num4.length/10000)*100).toFixed(2) + '%');
            set('ui-prog-num3', ((state.collected.num3.length/1000)*100).toFixed(1) + '%');
            
            const achCount = state.claimedAchievements.length;
            set('ui-ach-count', `${achCount} / ${ACHIEVEMENTS.length}`);
            const achBar = document.getElementById('ui-ach-bar');
            if(achBar) achBar.style.width = `${(achCount/ACHIEVEMENTS.length)*100}%`;
        }

        function getTotalItems() {
            if(currentTab === 'num4') return 10000;
            if(currentTab === 'num3') return 1000;
            return currentTab === 'eng3' ? ENG3_WORDS.length : ENG2_WORDS.length;
        }

        function updatePaginationUI() {
            const total = getTotalItems();
            const maxPage = Math.max(1, Math.ceil(total / ITEMS_PER_PAGE));
            setVal('page-total', `/ ${maxPage}`);
            const input = document.getElementById('input-page');
            if(input) input.value = pokedexPage + 1;
        }

        function setVal(id, val) { const el = document.getElementById(id); if(el) el.textContent = val; }

        function renderPokedex() {
            const grid = document.getElementById('pokedex-grid');
            if (!grid) return;
            grid.innerHTML = '';
            let items = [];
            if(currentTab.startsWith('num')) {
                const len = currentTab === 'num4' ? 4 : 3;
                const total = currentTab === 'num4' ? 10000 : 1000;
                for(let i=0; i<total; i++) {
                    const c = String(i).padStart(len, '0');
                    if(!searchQuery || c.includes(searchQuery)) items.push({code: c, collected: state.collected[currentTab].includes(c)});
                }
            } else {
                const list = currentTab === 'eng3' ? ENG3_WORDS : ENG2_WORDS;
                list.forEach(i => { if(!searchQuery || i.word.includes(searchQuery.toUpperCase())) items.push({code: i.word, collected: state.collected[currentTab].includes(i.word)}); });
            }
            
            setVal('ui-tab-count', `${state.collected[currentTab].length} / ${getTotalItems()}`);
            const paged = items.slice(pokedexPage * ITEMS_PER_PAGE, (pokedexPage + 1) * ITEMS_PER_PAGE);
            
            paged.forEach(item => {
                const card = document.createElement('div');
                card.className = item.collected ? 'bg-white text-black border-2 border-black p-2 rounded shadow-lg text-center' : 'glass text-slate-700 p-2 rounded text-center opacity-20 border-slate-700';
                card.innerHTML = `<div class="text-[6px] font-black opacity-40">TAIWAN</div><div class="font-mono font-black text-xs">${item.code}</div>`;
                grid.appendChild(card);
            });
            updatePaginationUI();
        }

        function renderAchievements() {
            const list = document.getElementById('achievements-list');
            if (!list) return;
            list.innerHTML = '';
            ACHIEVEMENTS.forEach(ach => {
                const isDone = ach.check(state);
                const isClaimed = state.claimedAchievements.includes(ach.id);
                const card = document.createElement('div');
                card.className = `achievement-card glass p-4 rounded-2xl flex items-center justify-between border-l-4 ${isDone ? 'border-emerald-500' : 'border-slate-800 opacity-60'}`;
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="text-xs font-black ${isDone ? 'text-emerald-400' : ''}">${ach.title}</div>
                        <div class="text-[9px] text-slate-400 font-bold">${ach.desc}</div>
                    </div>
                    <div>
                        ${isClaimed ? '<span class="text-[9px] text-emerald-500 font-black">已領取</span>' : 
                          (isDone ? `<button class="bg-emerald-600 px-3 py-1.5 rounded-lg text-[9px] font-black text-white" onclick="claimReward('${ach.id}')">領取</button>` : 
                          '<span class="text-[9px] text-slate-600 font-bold">未達成</span>')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.claimReward = (id) => {
            const ach = ACHIEVEMENTS.find(a => a.id === id);
            if(!ach || state.claimedAchievements.includes(id)) return;
            SFX.claim();
            state.claimedAchievements.push(id);
            addExp(ach.reward);
            saveState(); renderUI(); renderAchievements();
            showNotification(`🎁 獲得獎勵 ${ach.reward} XP`);
        };

        function showNotification(m) {
            const n = document.getElementById('notification');
            const nt = document.getElementById('notif-text');
            if(!n || !nt) return;
            nt.textContent = m;
            n.style.opacity = '1'; n.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { n.style.opacity = '0'; n.style.transform = 'translate(-50%, -20px)'; }, 2500);
        }

        function saveState() { localStorage.setItem('plate_adventure_v4', JSON.stringify(state)); }
        function loadState() { const s = localStorage.getItem('plate_adventure_v4'); if(s) state = JSON.parse(s); }

        window.onload = init;
    </script>
</body>
</html>
